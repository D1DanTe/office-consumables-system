{% extends "base.html" %}

{% block title %}
Редактирование пользователя
{% endblock %}

{% block content %}

<h1>Редактирование пользователя</h1>

<form method="POST">

    <p>Имя</p>
    <input
        type="text"
        name="first_name"
        value="{{ user.first_name }}"
        required
    >

    <p>Фамилия</p>
    <input
        type="text"
        name="last_name"
        value="{{ user.last_name }}"
        required
    >

    <p>Логин</p>
    <input
        type="text"
        name="login"
        value="{{ user.login }}"
        required
    >

    <p>Роль</p>

    <select name="role">

        <option value="super_admin">
            Супер-админ
        </option>

        <option value="admin">
            Администратор
        </option>

        <option value="user">
            Пользователь
        </option>

    </select>

    <br><br>

    <button type="submit">
        Сохранить
    </button>

</form>

{% endblock %}
